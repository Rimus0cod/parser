services:
  mysql:
    image: mysql:8.0
    container_name: parser_prod-mysql-1
    restart: always
    environment:
      # Мы используем только ROOT пароль, это создаст базу с полным доступом
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Убрали healthcheck, чтобы он не блокировал запуск всей системы

  redis:
    image: redis:7-alpine
    container_name: parser_prod-redis-1
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    ports:
      - "8000:8000"

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.scraper_worker"]
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis

  streamlit_ui:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "streamlit",
        "run",
        "app/ui/streamlit_app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501"
      ]
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
      - api
    ports:
      - "8501:8501"

volumes:
  mysql_data:
  redis_data: