services:
  mysql:
    image: mysql:8.0
    container_name: parser_prod-mysql-1
    restart: always
    environment:
      # Мы используем только ROOT пароль, это создаст базу с полным доступом
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: parser_prod-redis-1
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.scraper_worker"]
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: |
        bash -c '
        if [ "$(redis-cli -h redis get scrape:worker_status)" = "running" ]; then
          # Проверяем, что статус рабочего актуален (проверяем по времени последнего выполнения)
          LAST_EXEC_TIME=$(redis-cli -h redis get scrape:last_execution_time)
          if [ -n "$$LAST_EXEC_TIME" ]; then
            LAST_EXEC_EPOCH=$$(date -d "$$LAST_EXEC_TIME" +%s 2>/dev/null || echo 0)
            CURRENT_EPOCH=$$(date +%s)
            TIME_DIFF=$$((CURRENT_EPOCH - LAST_EXEC_EPOCH))
            # Если прошло менее 20 минут с последнего выполнения (15 мин + допуск), считаем OK
            if [ $$TIME_DIFF -lt 1200 ]; then
              exit 0
            else
              exit 1
            fi
          else
            exit 1
          fi
        else
          exit 1
        fi
        '
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  streamlit_ui:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "streamlit",
        "run",
        "app/ui/streamlit_app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "8501:8501"

volumes:
  mysql_data:
  redis_data:
